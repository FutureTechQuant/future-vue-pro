name: Java CI with Maven

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build with Maven
        env:
          DB_HOST: localhost
          DB_USERNAME: postgres
          DB_PASSWORD: postgres_ci_password
          REDIS_HOST: localhost
          REDIS_PASSWORD: ""
        run: |
          echo "🔧 使用 CI 环境变量进行编译..."
          mvn -B package --file pom.xml \
            -Dmaven.test.skip=true \
            -DDB_HOST="${DB_HOST}" \
            -DDB_USERNAME="${DB_USERNAME}" \
            -DDB_PASSWORD="${DB_PASSWORD}" \
            -DREDIS_HOST="${REDIS_HOST}" \
            -DREDIS_PASSWORD="${REDIS_PASSWORD}"
          echo "✅ 编译完成"

      - name: Verify JAR file
        run: |
          if [ -f "apps/future-server/target/future-server.jar" ]; then
            echo "✅ JAR 文件存在"
            ls -lh apps/future-server/target/future-server.jar
          else
            echo "❌ JAR 文件未找到"
            exit 1
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: future-server-jar
          path: apps/future-server/target/future-server.jar
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: future-server-jar
          path: dist

      - name: Verify downloaded JAR
        run: |
          echo "📦 下载的文件："
          ls -lh dist/
          if [ ! -f "dist/future-server.jar" ]; then
            echo "❌ JAR 文件未找到"
            exit 1
          fi

      - name: Ensure Cloudflare Tunnel is running
        uses: appleboy/ssh-action@v1
        env:
          TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: TUNNEL_TOKEN
          script: |
            set -e
            if docker ps --filter "name=cloudflared" --filter "status=running" -q | grep -q .; then
              echo "ℹ️  cloudflared 已在运行，跳过启动"
            else
              docker rm -f cloudflared 2>/dev/null || true
              docker run -d \
                --name cloudflared \
                --restart unless-stopped \
                --network host \
                cloudflare/cloudflared:latest \
                tunnel --no-autoupdate run \
                --token "${TUNNEL_TOKEN}"
              echo "⏳ 等待 Tunnel 建立连接..."
              sleep 5
              docker logs cloudflared --tail 20
            fi
            echo "✅ Cloudflare Tunnel 状态正常"

      - name: Copy JAR to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/future-server.jar"
          target: "/usr/local/myapp"
          strip_components: 1
          overwrite: true

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DB_HOST,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PASSWORD
          script: |
            set -e
            cd /usr/local/myapp

            echo "📦 验证文件..."
            ls -lh future-server.jar

            echo "🔧 更新 .env 文件..."
            cat > .env << EOF
            DB_HOST=${DB_HOST}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            REDIS_HOST=${REDIS_HOST}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            EOF

            echo "🏗️  构建镜像（如果需要）..."
            docker compose build

            echo "🔄 重启服务..."
            docker compose down
            docker compose up -d

            echo "⏳ 等待服务启动..."
            sleep 10

            echo "✅ 服务状态："
            docker compose ps

            echo "📋 应用日志（最后 30 行）："
            docker compose logs --tail 30 my-app

            echo "🏥 健康检查："
            docker compose exec -T my-app curl -s http://localhost:48080/actuator/health || echo "⚠️  健康检查失败（应用可能还在启动中）"
